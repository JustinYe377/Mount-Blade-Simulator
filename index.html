<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warbands — 2D Mount &amp; Blade</title>

  <!-- ── External libraries ── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>

  <!-- ── Game modules (load order matters — deps before dependents) ── -->

  <!-- 1. Constants & theme (no deps) -->
  <script src="src/config.js"></script>

  <!-- 2. Stateless utilities (depend on config only) -->
  <script src="src/utils/Noise.js"></script>
  <script src="src/utils/MinHeap.js"></script>
  <script src="src/utils/helpers.js"></script>   <!-- dist, clamp, calcPower, autoResolve -->

  <!-- 3. Core systems (depend on utils) -->
  <script src="src/systems/AStar.js"></script>

  <!-- 4. World-gen helpers (depend on config + MinHeap) -->
  <script src="src/world/Roads.js"></script>     <!-- roadAStar, chaikinSmooth -->

  <!-- 5. Entity state (depend on config) -->
  <script src="src/entities/Player.js"></script> <!-- player singleton -->
  <script src="src/entities/Lords.js"></script>  <!-- 12 static lord definitions -->
  <script src="src/data/Settlements.js"></script> <!-- 55 static settlements + road connections -->
  <script src="src/data/NPCData.js"></script>     <!-- static NPC roles, names, dialogue, quest roles -->

  <!-- 6. UI primitives — must define createStyledButton, drawPanelBg,
           drawMinimapFrame, drawMinimapBorder before WorldScene loads -->
  <script src="src/ui/Panel.js"></script>

  <!-- 7. Phaser scenes (depend on everything above) -->
  <script src="src/scenes/IntroScene.js"></script>
  <script src="src/scenes/WorldScene.js"></script>

  <!-- 8. Game bootstrap (runs last — all classes must be defined) -->
  <script src="src/main.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #game-container { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="game-container"></div>
</body>
</html>
